name: CI

on:
  push:

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Make mvnw executable
        run: chmod +x mvnw

      - name: Build and verify coverage
        run: ./mvnw verify

      - name: Upload JaCoCo report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/

  release:
    name: Release
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Make mvnw executable
        run: chmod +x mvnw

      - name: Extract version from pom.xml
        id: version
        run: |
          VERSION=$(./mvnw help:evaluate -Dexpression=project.version -q -DforceStdout)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Detected version: $VERSION"

      - name: Get latest git tag
        id: latest_tag
        run: |
          TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Latest tag: ${TAG:-<none>}"

      - name: Check version is bumped
        run: |
          CURRENT="v${{ steps.version.outputs.version }}"
          LATEST="${{ steps.latest_tag.outputs.tag }}"
          if [ -n "$LATEST" ] && [ "$CURRENT" = "$LATEST" ]; then
            echo "ERROR: Version $CURRENT in pom.xml matches the latest tag."
            echo "Bump the version in pom.xml before pushing to master."
            exit 1
          fi
          echo "Version check passed: $CURRENT (latest tag: ${LATEST:-<none>})"

      - name: Build JAR
        run: ./mvnw package -DskipTests

      - name: Tag and publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="v${VERSION}"
          JAR="target/car-rental-system-${VERSION}.jar"

          git tag "$TAG"
          git push origin "$TAG"

          gh release create "$TAG" \
            --title "Release $TAG" \
            --notes "Release $TAG" \
            "$JAR"
